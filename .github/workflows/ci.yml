name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -e ".[web,dev]"
      - name: Test
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Test
        working-directory: frontend
        run: npm test
      - name: Build
        working-directory: frontend
        run: npm run build

  windows-package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Install build dependencies
        run: python -m pip install ".[build,dev]"
      - name: Build portable application
        run: python -m PyInstaller --noconfirm packaging/prompt-architect.spec
      - name: Smoke test packaged runtime
        shell: pwsh
        run: |
          $smokeData = Join-Path $env:RUNNER_TEMP "prompt-architect-smoke"
          $env:PROMPT_ARCHITECT_DATA_DIR = $smokeData
          $process = Start-Process -FilePath "dist\PromptArchitect\PromptArchitect.exe" -ArgumentList "--smoke-test" -Wait -PassThru
          if ($process.ExitCode -ne 0) { throw "Packaged runtime smoke test failed with exit code $($process.ExitCode)" }
